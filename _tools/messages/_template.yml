# 送信テンプレート（サンプル）
# 使い方: このファイルをコピーして _tools/messages/{用途名}.yml を作り、件名・本文・差出人を編集してから
#   python _tools/send_all.py --message _tools/messages/{用途名}.yml
# のように指定する。
#
# 本文・件名内で使える変数:
#   {{自治体名}}     例: 札幌市 / 中札内村
#   {{敬称}}         このファイルの `敬称` 値
#   {{差出人.氏名}} {{差出人.住所}} {{差出人.電話}} {{差出人.メール}}
#
# 機能:
#   - body_html を追加すると HTML メールとして送られる（email 経路のみ）
#   - フォーム送信時、本文は `body` をそのまま使う（HTML は使用しない）

subject: "{{自治体名}}へのお問い合わせ"

body: |
  {{自治体名}} {{敬称}}

  お世話になっております。
  （本文をここに記述）

  --
  {{差出人.氏名}}
  {{差出人.住所}}
  TEL: {{差出人.電話}}
  MAIL: {{差出人.メール}}

敬称: "ご担当者様"

差出人:
  氏名: "高橋 崇一郎"
  住所: ""
  電話: ""
  メール: "s.takahashi.hokkaido@gmail.com"
